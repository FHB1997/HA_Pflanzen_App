add_plant:
  name: Pflanze hinzufügen
  description: Legt eine neue Pflanze an und gibt deren ID zurück.
  fields:
    name:
      name: Name
      description: Anzeigename der Pflanze.
      required: true
      selector:
        text:
    species:
      name: Spezies
      description: Botanischer Name (z.B. Monstera deliciosa).
      selector:
        text:
    common_name:
      name: Trivialname
      description: Deutscher / umgangssprachlicher Name.
      selector:
        text:
    location:
      name: Standort
      description: Raum oder Position.
      selector:
        text:
    water_days:
      name: Gießintervall (Tage)
      description: Tage zwischen den Gießvorgängen.
      default: 7
      selector:
        number:
          min: 1
          max: 90
          mode: box
    fertilize_days:
      name: Düngeintervall (Tage)
      description: Tage zwischen den Düngevorgängen.
      default: 30
      selector:
        number:
          min: 1
          max: 180
          mode: box
    moisture_sensor:
      name: Bodenfeuchte-Sensor
      description: Optionaler Sensor zur Übersteuerung des Intervalls.
      selector:
        entity:
          domain: sensor
    photo:
      name: Foto
      description: Data-URL oder relativer Pfad.
      selector:
        text:
          multiline: true
    tips:
      name: Pflegetipps
      description: Freitext-Notizen.
      selector:
        text:
          multiline: true
    light_level:
      name: Lichtintensität
      description: vollsonne / hell / halbschatten / schatten
      selector:
        select:
          options:
            - vollsonne
            - hell
            - halbschatten
            - schatten
    room_type:
      name: Raum
      description: Strukturierter Raum-Typ (Wohnzimmer, Schlafzimmer, …).
      selector:
        text:
    location_tips:
      name: Standort-Tipps
      description: Optional, wird normalerweise von der KI gefüllt.
      selector:
        text:
          multiline: true
    suitability_warning:
      name: Eignungs-Warnung
      description: Optional, wird normalerweise von der KI gefüllt.
      selector:
        text:
          multiline: true

update_plant:
  name: Pflanze aktualisieren
  description: Aktualisiert Felder einer vorhandenen Pflanze.
  fields:
    plant_id:
      name: Pflanzen-ID
      required: true
      selector:
        text:
    name:
      selector:
        text:
    species:
      selector:
        text:
    common_name:
      selector:
        text:
    location:
      selector:
        text:
    water_days:
      selector:
        number:
          min: 1
          max: 90
          mode: box
    fertilize_days:
      selector:
        number:
          min: 1
          max: 180
          mode: box
    moisture_sensor:
      selector:
        entity:
          domain: sensor
    photo:
      selector:
        text:
          multiline: true
    tips:
      selector:
        text:
          multiline: true
    light_level:
      selector:
        select:
          options:
            - vollsonne
            - hell
            - halbschatten
            - schatten
    room_type:
      selector:
        text:
    location_tips:
      selector:
        text:
          multiline: true
    suitability_warning:
      selector:
        text:
          multiline: true

remove_plant:
  name: Pflanze entfernen
  description: Löscht eine Pflanze.
  fields:
    plant_id:
      name: Pflanzen-ID
      required: true
      selector:
        text:

water_plant:
  name: Als gegossen markieren
  description: Markiert die Pflanze als jetzt gegossen.
  fields:
    plant_id:
      name: Pflanzen-ID
      required: true
      selector:
        text:
    timestamp:
      name: Zeitstempel
      description: Optional, Standard ist jetzt.
      selector:
        datetime:

fertilize_plant:
  name: Als gedüngt markieren
  description: Markiert die Pflanze als jetzt gedüngt.
  fields:
    plant_id:
      name: Pflanzen-ID
      required: true
      selector:
        text:
    timestamp:
      name: Zeitstempel
      description: Optional, Standard ist jetzt.
      selector:
        datetime:

add_plant_photo:
  name: Foto hinzufügen
  description: >
    Fügt ein Foto zum Verlauf einer Pflanze hinzu. Entweder ein
    `path` (auf eine bereits hochgeladene Datei) oder `image_base64`
    muss gesetzt sein.
  fields:
    plant_id:
      required: true
      selector:
        text:
    path:
      name: Pfad
      description: URL-Pfad zu einer bereits hochgeladenen Datei.
      selector:
        text:
    image_base64:
      name: Base64-Bild
      description: Alternative zu path; wird direkt hochgeladen.
      selector:
        text:
          multiline: true
    note:
      name: Notiz
      selector:
        text:
    taken_at:
      name: Aufnahmedatum
      description: Optional, Default ist jetzt.
      selector:
        datetime:

remove_plant_photo:
  name: Foto entfernen
  description: Entfernt ein Foto aus dem Verlauf einer Pflanze.
  fields:
    plant_id:
      required: true
      selector:
        text:
    path:
      name: Pfad
      required: true
      selector:
        text:
    keep_file:
      name: Datei behalten
      description: Wenn aktiv, wird nur der Eintrag entfernt, die Datei aber nicht vom Disk gelöscht.
      default: false
      selector:
        boolean:

send_reminders:
  name: Erinnerungen jetzt senden
  description: >
    Prüft alle Pflanzen und sendet Benachrichtigungen über den
    konfigurierten Notify-Service. Respektiert Ruhezeiten und Rate-Limit,
    außer "force" ist gesetzt.
  fields:
    plant_id:
      name: Pflanzen-ID
      description: Optional, nur diese Pflanze.
      selector:
        text:
    force:
      name: Erzwingen
      description: Ruhezeit und Rate-Limit ignorieren.
      default: false
      selector:
        boolean:
