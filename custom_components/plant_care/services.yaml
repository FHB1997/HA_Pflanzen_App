add_plant:
  name: Pflanze hinzufügen
  description: Legt eine neue Pflanze an und gibt deren ID zurück.
  fields:
    name:
      name: Name
      description: Anzeigename der Pflanze.
      required: true
      selector:
        text:
    species:
      name: Spezies
      description: Botanischer Name (z.B. Monstera deliciosa).
      selector:
        text:
    common_name:
      name: Trivialname
      description: Deutscher / umgangssprachlicher Name.
      selector:
        text:
    location:
      name: Standort
      description: Raum oder Position.
      selector:
        text:
    water_days:
      name: Gießintervall (Tage)
      description: Tage zwischen den Gießvorgängen.
      default: 7
      selector:
        number:
          min: 1
          max: 90
          mode: box
    fertilize_days:
      name: Düngeintervall (Tage)
      description: Tage zwischen den Düngevorgängen.
      default: 30
      selector:
        number:
          min: 1
          max: 180
          mode: box
    moisture_sensor:
      name: Bodenfeuchte-Sensor
      description: Optionaler Sensor zur Übersteuerung des Intervalls.
      selector:
        entity:
          domain: sensor
    photo:
      name: Foto
      description: Data-URL oder relativer Pfad.
      selector:
        text:
          multiline: true
    light_level:
      name: Lichtintensität
      description: vollsonne / hell / halbschatten / schatten
      selector:
        select:
          options:
            - vollsonne
            - hell
            - halbschatten
            - schatten
    room_type:
      name: Raum
      description: Strukturierter Raum-Typ (Wohnzimmer, Schlafzimmer, …).
      selector:
        text:
    suitability_warning:
      name: Eignungs-Warnung
      description: Optional, wird normalerweise von der KI gefüllt.
      selector:
        text:
          multiline: true
    plant_description:
      name: Pflanzen-Beschreibung
      description: Kurzer Wiki-Text zur Pflanze, normalerweise von der KI gefüllt.
      selector:
        text:
          multiline: true

update_plant:
  name: Pflanze aktualisieren
  description: Aktualisiert Felder einer vorhandenen Pflanze.
  fields:
    plant_id:
      name: Pflanzen-ID
      required: true
      selector:
        text:
    name:
      selector:
        text:
    species:
      selector:
        text:
    common_name:
      selector:
        text:
    location:
      selector:
        text:
    water_days:
      selector:
        number:
          min: 1
          max: 90
          mode: box
    fertilize_days:
      selector:
        number:
          min: 1
          max: 180
          mode: box
    moisture_sensor:
      selector:
        entity:
          domain: sensor
    photo:
      selector:
        text:
          multiline: true
    light_level:
      selector:
        select:
          options:
            - vollsonne
            - hell
            - halbschatten
            - schatten
    room_type:
      selector:
        text:
    suitability_warning:
      selector:
        text:
          multiline: true
    plant_description:
      selector:
        text:
          multiline: true

remove_plant:
  name: Pflanze entfernen
  description: Löscht eine Pflanze.
  fields:
    plant_id:
      name: Pflanzen-ID
      required: true
      selector:
        text:

water_plant:
  name: Als gegossen markieren
  description: Markiert die Pflanze als jetzt gegossen.
  fields:
    plant_id:
      name: Pflanzen-ID
      required: true
      selector:
        text:
    timestamp:
      name: Zeitstempel
      description: Optional, Standard ist jetzt.
      selector:
        datetime:

fertilize_plant:
  name: Als gedüngt markieren
  description: Markiert die Pflanze als jetzt gedüngt.
  fields:
    plant_id:
      name: Pflanzen-ID
      required: true
      selector:
        text:
    timestamp:
      name: Zeitstempel
      description: Optional, Standard ist jetzt.
      selector:
        datetime:

get_events:
  name: Pflege-Termine holen
  description: >
    Liefert geplante Pflege-Termine (Gießen, Düngen) für den angegebenen
    Zeitraum. Wird vom Plant-Care-Panel verwendet.
  fields:
    start:
      name: Start
      description: ISO-8601 Zeitstempel. Default ist jetzt.
      selector:
        datetime:
    end:
      name: Ende
      description: ISO-8601 Zeitstempel. Wenn nicht gesetzt, start + days.
      selector:
        datetime:
    days:
      name: Tage
      description: Zeitraum-Länge in Tagen ab start (Default 14).
      default: 14
      selector:
        number:
          min: 1
          max: 180
          mode: box
    plant_id:
      name: Pflanzen-ID
      description: Optional, nur diese Pflanze.
      selector:
        text:

diagnose_plant:
  name: Pflanze diagnostizieren
  description: >
    Speichert ein AI-Diagnose-Ergebnis als Treatment-Eintrag. Der
    eigentliche AI-Call (ai_task.generate_data) läuft im Frontend.
  fields:
    plant_id:
      required: true
      selector:
        text:
    photo_path:
      required: true
      selector:
        text:
    ai_response:
      required: true
      selector:
        object:

resolve_treatment:
  name: Behandlung abschließen
  description: Markiert ein offenes Treatment als erledigt oder verworfen.
  fields:
    plant_id:
      required: true
      selector:
        text:
    treatment_id:
      required: true
      selector:
        text:
    outcome:
      default: resolved
      selector:
        select:
          options:
            - resolved
            - dismissed

add_plant_photo:
  name: Foto hinzufügen
  description: >
    Fügt ein Foto zum Verlauf einer Pflanze hinzu. Entweder ein
    `path` (auf eine bereits hochgeladene Datei) oder `image_base64`
    muss gesetzt sein.
  fields:
    plant_id:
      required: true
      selector:
        text:
    path:
      name: Pfad
      description: URL-Pfad zu einer bereits hochgeladenen Datei.
      selector:
        text:
    image_base64:
      name: Base64-Bild
      description: Alternative zu path; wird direkt hochgeladen.
      selector:
        text:
          multiline: true
    note:
      name: Notiz
      selector:
        text:
    taken_at:
      name: Aufnahmedatum
      description: Optional, Default ist jetzt.
      selector:
        datetime:

remove_plant_photo:
  name: Foto entfernen
  description: Entfernt ein Foto aus dem Verlauf einer Pflanze.
  fields:
    plant_id:
      required: true
      selector:
        text:
    path:
      name: Pfad
      required: true
      selector:
        text:
    keep_file:
      name: Datei behalten
      description: Wenn aktiv, wird nur der Eintrag entfernt, die Datei aber nicht vom Disk gelöscht.
      default: false
      selector:
        boolean:

send_reminders:
  name: Erinnerungen jetzt senden
  description: >
    Prüft alle Pflanzen und sendet Benachrichtigungen über den
    konfigurierten Notify-Service. Respektiert Ruhezeiten und Rate-Limit,
    außer "force" ist gesetzt.
  fields:
    plant_id:
      name: Pflanzen-ID
      description: Optional, nur diese Pflanze.
      selector:
        text:
    force:
      name: Erzwingen
      description: Ruhezeit und Rate-Limit ignorieren.
      default: false
      selector:
        boolean:

send_test_notification:
  name: Test-Benachrichtigung senden
  description: >
    Sendet eine statische Test-Nachricht an alle konfigurierten
    Notify-Targets. Ignoriert Ruhezeiten und Rate-Limit. Gibt die
    Liste der Targets und etwaige Fehler zurück.
